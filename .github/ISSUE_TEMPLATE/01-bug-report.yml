name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thanks for reporting a bug! Please fill out the information below to help us fix it quickly.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have checked the documentation
          required: true
        - label: I am running the latest version of HELBACKUP
          required: false

  - type: input
    id: version
    attributes:
      label: 📦 HELBACKUP Version
      description: What version are you running?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: input
    id: unraid-version
    attributes:
      label: 🖥️ Unraid Version
      description: What Unraid version are you using?
      placeholder: "e.g., 6.12.6"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: Clear description of what's happening
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What should happen?
      placeholder: "Describe what you expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happens?
      placeholder: "Describe what actually happens..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Logs
      description: Paste relevant logs (if any)
      placeholder: "Paste logs here..."
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 💬 Additional Context
      description: Screenshots, configuration, or other relevant info
