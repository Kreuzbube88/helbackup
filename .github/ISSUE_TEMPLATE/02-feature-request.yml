name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        We'd love to hear your ideas! Please describe the feature you'd like to see.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: This feature doesn't exist in the latest version
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: How should this feature work?
      placeholder: "Describe your ideal solution..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: What other solutions have you thought about?
      placeholder: "Describe alternative approaches..."

  - type: textarea
    id: examples
    attributes:
      label: 📸 Examples
      description: Screenshots, mockups, or examples from other tools
      placeholder: "Add examples if helpful..."

  - type: dropdown
    id: priority
    attributes:
      label: 🎯 Priority (Your Opinion)
      options:
        - Low - Nice to have
        - Medium - Would improve workflow
        - High - Critical for my use case
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 💬 Additional Context
