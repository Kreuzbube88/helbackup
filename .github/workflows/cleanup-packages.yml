name: Cleanup All Packages

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete all package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const packageName = 'helbackup';
            const packageType = 'container';

            try {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                {
                  package_type: packageType,
                  package_name: packageName,
                  username: owner,
                  per_page: 100,
                }
              );

              console.log(`Found ${versions.length} package versions to delete`);

              for (const version of versions) {
                console.log(`Deleting version ${version.id} (${version.metadata?.container?.tags?.join(', ') || 'untagged'})`);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: packageType,
                  package_name: packageName,
                  username: owner,
                  package_version_id: version.id,
                });
              }

              console.log('All package versions deleted');
            } catch (error) {
              if (error.status === 404) {
                console.log('No packages found');
              } else {
                throw error;
              }
            }
