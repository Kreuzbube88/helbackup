name: Release Latest
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/helbackup
jobs:
  validate:
    name: Type-check & Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: TypeScript type-check (backend)
        run: cd backend && npx tsc --noEmit

      - name: Run backend tests
        run: cd backend && npm test

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (type-check + vite)
        run: cd frontend && npm run build

  release:
    name: Build, Push & Release
    needs: validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump backend package.json version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          cd backend
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version=process.env.INPUT_VERSION;
            fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');
          "

      - name: Commit and tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to $INPUT_VERSION"
            git push
          fi
          git tag -f "v$INPUT_VERSION"
          git push origin "v$INPUT_VERSION" --force

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          script: |
            const version = process.env.INPUT_VERSION
            const image = process.env.IMAGE_NAME
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: `Docker: \`ghcr.io/${image}:${version}\` (also tagged \`latest\`)`,
              draft: false,
              prerelease: false,
              make_latest: 'true'
            })
